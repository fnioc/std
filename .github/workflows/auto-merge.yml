name: auto-merge

# Adds every non-draft PR to the merge queue. `--auto` = "merge when ready", which
# under a merge queue enqueues the PR; the merge-queue ruleset on main runs the
# required `verify` check on the merge group and squash-merges when green. The queue
# owns the merge method, so no strategy flag is passed.
#
# GITHUB_TOKEN is fine here: the queue (not this token) performs the merge, so the
# post-merge push to main triggers downstream workflows normally.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enqueue (merge when ready)
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge --auto --repo "$GITHUB_REPOSITORY" "$PR_NUMBER"
