name: auto-merge

# Adds every non-draft PR to the merge queue. `--auto` = "merge when ready", which
# under a merge queue enqueues the PR; the merge-queue ruleset on main runs the
# required `verify` check on the merge group and squash-merges when green. The queue
# owns the merge method, so no strategy flag is passed.
#
# Uses a PAT (secrets.AUTOMERGE_PAT), NOT the default GITHUB_TOKEN: GitHub deliberately
# won't fire a GITHUB_TOKEN-armed "merge when ready" — it arms, then never enqueues — so
# a real user token is required for the enqueue to actually happen. The queue performs
# the squash-merge once the merge-group `verify` is green.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Enqueue (merge when ready)
        env:
          GH_TOKEN: ${{ secrets.AUTOMERGE_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge --auto --repo "$GITHUB_REPOSITORY" "$PR_NUMBER"
