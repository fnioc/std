name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
    inputs:
      alpha_version:
        description: "Alpha version to publish (0.0.0-alphaN)"
        required: true
        default: "0.0.0-alpha3"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

jobs:
  verify:
    name: verify
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    # A cold ttsc plugin cache compiles the typescript-go sidecar from scratch
    # (~5 min). The gate now also runs the ttsc e2e suites (each compiles the
    # sidecar into its own cache dir), so give the whole job room to survive a
    # cold run on top of the normal gate; warm-cache runs finish in a few minutes.
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The ttsc/Go lowering engine (transforms/) compiles a native sidecar with
      # the mise-pinned Go; `bun run build`/`bun run test` resolve it via
      # `mise which go`. Install the mise.toml toolchain so Go is on PATH.
      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install

      # The compiled ttsc sidecars + ttsc's own Go object cache live at the shared,
      # content-keyed ~/.cache/fnioc-ttsc/cache (~30 MB per sidecar binary plus a few
      # GB of Go objects). Cache that — plus the general Go build cache and whatever
      # else lands under node_modules/.cache — keyed on the Go sources + toolchain
      # manifest + ttsc version (bun.lock) so only a genuine transform change forces
      # a cold rebuild. Scoped to .../cache so the throwaway per-worktree e2e
      # sandboxes (~/.cache/fnioc-ttsc/sandboxes, rebuilt each run) ride outside it.
      - name: Cache ttsc plugin sidecars
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/fnioc-ttsc/cache
            ~/.cache/go-build
            node_modules/.cache
          key: ttsc-plugins-${{ runner.os }}-${{ hashFiles('transforms/**/*.go', 'transforms/go.mod', 'bun.lock') }}
          restore-keys: |
            ttsc-plugins-${{ runner.os }}-

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Lint
        run: bun run lint

      - name: Format
        run: bun run format:check

      # The Go/ttsc engine's own gates. transforms/go.work is machine-specific and
      # gitignored, so generate it against the installed ttsc shim modules first.
      - name: Go gates (transforms)
        run: |
          node scripts/gen-go-work.mjs
          cd transforms
          export GOTOOLCHAIN=local
          go build ./...
          go vet ./...
          go test ./...
          test -z "$(gofmt -l .)"

  publish-alpha-verify:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # build-all.ts lowers caching.core through the ttsc/Go engine, which needs
      # the mise-pinned Go on PATH (resolved via `mise which go`).
      - uses: jdx/mise-action@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache ttsc plugin sidecars
        uses: actions/cache@v4
        with:
          path: ~/.cache/fnioc-ttsc/cache
          key: ttsc-plugins-${{ runner.os }}-${{ hashFiles('transforms/**/*.go', 'transforms/go.mod', 'bun.lock') }}
          restore-keys: |
            ttsc-plugins-${{ runner.os }}-

      - name: Upgrade npm (OIDC trusted publishing needs >=11.5.1)
        run: npm install -g npm@latest

      - name: Install pnpm (required for workspace:* rewrite + publishConfig.exports swap)
        run: npm install -g pnpm@10.34.4

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun scripts/build-all.ts

      - name: Publish alpha verification round
        env:
          ALPHA_VERSION: ${{ inputs.alpha_version }}
        run: |
          set -euo pipefail
          ORDER=(primitives config.core options di.core config config.env config.json config.commandline options.augmentations di di.transformer config.transformer di.transformer.options)
          for pkg in "${ORDER[@]}"; do
            (
              cd "libraries/$pkg"
              pnpm pkg set version="$ALPHA_VERSION"
              pnpm publish --tag alpha --provenance --no-git-checks
            )
          done
