name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:
    inputs:
      alpha_version:
        description: "Alpha version to publish (0.0.0-alphaN)"
        required: true
        default: "0.0.0-alpha3"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}

jobs:
  verify:
    name: verify
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    # A cold ttsc plugin cache compiles the typescript-go sidecars from scratch
    # (~5 min per distinct plugin, 3 plugins). Give the whole job room to survive
    # that on top of the normal gate; warm-cache runs finish in a couple minutes.
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The ttsc/Go lowering engine (transforms/) compiles a native sidecar with
      # the mise-pinned Go; `bun run build`/`bun run test` resolve it via
      # `mise which go`. Install the mise.toml toolchain so Go is on PATH.
      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install

      # The compiled ttsc sidecars live under node_modules/.cache/ttsc (~25 MB
      # each). Cache them keyed on the Go sources + toolchain manifest + ttsc
      # version (bun.lock) so only a genuine transform change forces a cold build.
      - name: Cache ttsc plugin sidecars
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/ttsc
          key: ttsc-plugins-${{ runner.os }}-${{ hashFiles('transforms/**/*.go', 'transforms/go.mod', 'bun.lock') }}
          restore-keys: |
            ttsc-plugins-${{ runner.os }}-

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Lint
        run: bun run lint

      - name: Format
        run: bun run format:check

  publish-alpha-verify:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # build-all.ts lowers caching.core through the ttsc/Go engine, which needs
      # the mise-pinned Go on PATH (resolved via `mise which go`).
      - uses: jdx/mise-action@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache ttsc plugin sidecars
        uses: actions/cache@v4
        with:
          path: node_modules/.cache/ttsc
          key: ttsc-plugins-${{ runner.os }}-${{ hashFiles('transforms/**/*.go', 'transforms/go.mod', 'bun.lock') }}
          restore-keys: |
            ttsc-plugins-${{ runner.os }}-

      - name: Upgrade npm (OIDC trusted publishing needs >=11.5.1)
        run: npm install -g npm@latest

      - name: Install pnpm (required for workspace:* rewrite + publishConfig.exports swap)
        run: npm install -g pnpm@10.34.4

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun scripts/build-all.ts

      - name: Publish alpha verification round
        env:
          ALPHA_VERSION: ${{ inputs.alpha_version }}
        run: |
          set -euo pipefail
          ORDER=(primitives config.core options di.core config config.env config.json config.commandline options.augmentations di di.transformer config.transformer di.transformer.options)
          for pkg in "${ORDER[@]}"; do
            (
              cd "libraries/$pkg"
              pnpm pkg set version="$ALPHA_VERSION"
              pnpm publish --tag alpha --provenance --no-git-checks
            )
          done
